
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Voice Q&A Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #question, #answer {
      margin-top: 15px;
      padding: 10px;
      border: 1px solid #ddd;
      min-height: 40px;
      text-align: left;
    }

    .loading {
      color: blue;
    }
  </style>
</head>
<body>

  <h2>🎤 Voice Question Tool</h2>

  <button onclick="startListening()">Ask Question</button>

  <h4>Your Question:</h4>
  <div id="question"></div>

  <h4>Answer:</h4>
  <div id="answer"></div>

<script>
  function startListening() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = function(event) {
      const transcript = event.results[0][0].transcript;
      document.getElementById("question").innerText = transcript;
      getAnswer(transcript);
    };

    recognition.onerror = function(event) {
      alert("Error occurred in recognition: " + event.error);
    };
  }

  async function getAnswer(question) {
    document.getElementById("answer").innerHTML = "<span class='loading'>Thinking...</span>";

    try {
      const response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer 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"
        },
        body: JSON.stringify({
          model: "gpt-4o-mini",
          messages: [
            { role: "system", content: "You are a helpful assistant. Give clear and short answers." },
            { role: "user", content: question }
          ]
        })
      });

      const data = await response.json();
      const answer = data.choices[0].message.content;

      document.getElementById("answer").innerText = answer;

    } catch (error) {
      document.getElementById("answer").innerText = "Error getting answer.";
      console.error(error);
    }
  }
</script>

</body>
</html>
